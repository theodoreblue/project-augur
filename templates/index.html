<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AUGUR — Live Trading Dashboard</title>
<style>
  :root {
    --bg: #0a0e17;
    --card: #111827;
    --border: #1f2937;
    --green: #00ff88;
    --green-dim: #00cc6a;
    --red: #ff4757;
    --orange: #ffa502;
    --gray: #6b7280;
    --text: #e5e7eb;
    --text-dim: #9ca3af;
    --blue: #3b82f6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 14px;
    min-height: 100vh;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 30px;
    border-bottom: 1px solid var(--border);
  }
  .header h1 {
    font-size: 22px;
    color: var(--green);
    letter-spacing: 3px;
  }
  .header h1 span { color: var(--text-dim); font-weight: 300; font-size: 14px; letter-spacing: 0; }
  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .countdown {
    color: var(--text-dim);
    font-size: 12px;
  }
  .countdown strong { color: var(--green); }

  /* Stat Cards */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    padding: 24px 30px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 20px;
  }
  .stat-card .label {
    color: var(--text-dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .stat-card .value {
    font-size: 28px;
    font-weight: 700;
    color: var(--green);
  }
  .stat-card .value.negative { color: var(--red); }
  .stat-card .sub { color: var(--text-dim); font-size: 11px; margin-top: 4px; }

  /* Buttons */
  .actions {
    padding: 0 30px 16px;
    display: flex;
    gap: 12px;
  }
  .btn {
    padding: 10px 24px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--card);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--green); color: var(--green); }
  .btn.live { border-color: var(--green-dim); color: var(--green); }
  .btn.live:hover { background: var(--green); color: var(--bg); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-status { font-size: 11px; color: var(--text-dim); margin-left: 8px; }

  /* Trades Table */
  .table-wrap {
    padding: 0 30px 40px;
    overflow-x: auto;
  }
  .table-wrap h2 {
    color: var(--text);
    font-size: 16px;
    margin-bottom: 12px;
    font-weight: 500;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  th {
    text-align: left;
    padding: 10px 12px;
    border-bottom: 2px solid var(--border);
    color: var(--text-dim);
    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tr.won td { color: var(--green); }
  tr.lost td { color: var(--red); }
  tr.open td { color: var(--orange); }
  tr.dry_run td { color: var(--gray); }
  .question { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .side-yes { color: var(--green); font-weight: 700; }
  .side-no { color: var(--blue); font-weight: 700; }
  .addon { color: var(--orange); font-size: 10px; }
  .empty-state {
    text-align: center;
    padding: 60px;
    color: var(--text-dim);
    font-size: 16px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>AUGUR <span>— Live Trading Dashboard</span></h1>
  <div class="header-right">
    <div class="countdown">Refresh in <strong id="timer">60</strong>s</div>
  </div>
</div>

<div class="stats" id="stats">
  <div class="stat-card"><div class="label">Live Bankroll</div><div class="value" id="s-bankroll">—</div><div class="sub" id="s-bankroll-src"></div></div>
  <div class="stat-card"><div class="label">Total P&L</div><div class="value" id="s-pnl">—</div></div>
  <div class="stat-card"><div class="label">Open Positions</div><div class="value" id="s-positions">—</div></div>
  <div class="stat-card"><div class="label">Total Bets</div><div class="value" id="s-bets">—</div><div class="sub" id="s-bets-sub"></div></div>
  <div class="stat-card"><div class="label">Win Rate</div><div class="value" id="s-winrate">—</div><div class="sub" id="s-winrate-sub"></div></div>
  <div class="stat-card"><div class="label">Best Edge</div><div class="value" id="s-edge">—</div></div>
</div>

<div class="actions">
  <button class="btn" id="btn-dry" onclick="runScan('dry')">▶ Dry Run</button>
  <button class="btn live" id="btn-live" onclick="runScan('live')">⚡ Run Scan (Live)</button>
  <span class="btn-status" id="run-status"></span>
</div>

<div class="table-wrap">
  <h2>Trade Log</h2>
  <table>
    <thead>
      <tr>
        <th>Time</th>
        <th>Market</th>
        <th>Side</th>
        <th>True Prob</th>
        <th>Price</th>
        <th>Edge Ratio</th>
        <th>Bet Size</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="trades-body">
      <tr><td colspan="8" class="empty-state">Loading...</td></tr>
    </tbody>
  </table>
</div>

<script>
let countdown = 60;

function fmt$(v) {
  if (v == null) return '—';
  const n = parseFloat(v);
  return (n >= 0 ? '$' : '-$') + Math.abs(n).toFixed(2);
}

function fmtPct(v) {
  if (v == null) return '—';
  return (parseFloat(v) * 100).toFixed(1) + '%';
}

function fmtTime(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false });
}

async function refresh() {
  try {
    const [statsR, tradesR, balR, posR] = await Promise.all([
      fetch('/api/stats'), fetch('/api/trades'), fetch('/api/balance'), fetch('/api/positions')
    ]);
    const stats = await statsR.json();
    const trades = await tradesR.json();
    const bal = await balR.json();
    const pos = await posR.json();

    // Stats
    const bankroll = bal.live_balance ?? bal.state_balance;
    document.getElementById('s-bankroll').textContent = fmt$(bankroll);
    document.getElementById('s-bankroll-src').textContent = bal.source === 'kalshi_api' ? 'Live from Kalshi' : 'From state file';

    const pnlEl = document.getElementById('s-pnl');
    pnlEl.textContent = fmt$(stats.total_pnl);
    pnlEl.className = 'value' + (stats.total_pnl < 0 ? ' negative' : '');

    document.getElementById('s-positions').textContent = pos.open_positions ?? pos.state_open ?? '—';
    document.getElementById('s-bets').textContent = stats.total_bets;
    document.getElementById('s-bets-sub').textContent = `${stats.yes_bets} YES · ${stats.no_bets} NO · ${stats.dry_runs} dry`;
    document.getElementById('s-winrate').textContent = stats.win_rate + '%';
    document.getElementById('s-winrate-sub').textContent = `${stats.wins}W / ${stats.losses}L`;
    document.getElementById('s-edge').textContent = stats.best_edge + 'x';

    // Trades
    const tbody = document.getElementById('trades-body');
    if (trades.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" class="empty-state">No trades yet. Run a scan to get started.</td></tr>';
      return;
    }
    tbody.innerHTML = trades.map(t => `
      <tr class="${t.status}">
        <td>${fmtTime(t.ts)}</td>
        <td class="question" title="${(t.question||'').replace(/"/g,'&quot;')}">${t.question || t.ticker}</td>
        <td><span class="side-${t.side.toLowerCase()}">${t.side}</span>${t.type === 'add-on' ? ' <span class="addon">ADD-ON</span>' : ''}</td>
        <td>${fmtPct(t.true_prob)}</td>
        <td>${t.yes_price ? '$' + t.yes_price.toFixed(4) : '—'}</td>
        <td>${t.ratio ? t.ratio.toFixed(1) + 'x' : '—'}</td>
        <td>${t.bet_size_usd ? '$' + parseFloat(t.bet_size_usd).toFixed(2) : '—'}</td>
        <td>${t.status.replace('_', ' ').toUpperCase()}</td>
      </tr>
    `).join('');
  } catch (e) {
    console.error('Refresh failed:', e);
  }
}

async function runScan(mode) {
  const btn = mode === 'live' ? document.getElementById('btn-live') : document.getElementById('btn-dry');
  const status = document.getElementById('run-status');
  btn.disabled = true;
  status.textContent = `Running ${mode} scan...`;
  status.style.color = '#ffa502';

  try {
    const r = await fetch('/api/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode }),
    });
    const data = await r.json();
    if (data.status === 'completed') {
      status.textContent = `${mode} scan complete (exit ${data.return_code})`;
      status.style.color = data.return_code === 0 ? '#00ff88' : '#ff4757';
      refresh();
    } else {
      status.textContent = `Scan ${data.status}: ${data.error || ''}`;
      status.style.color = '#ff4757';
    }
  } catch (e) {
    status.textContent = 'Scan failed: ' + e.message;
    status.style.color = '#ff4757';
  }
  btn.disabled = false;
}

// Countdown + auto-refresh
setInterval(() => {
  countdown--;
  document.getElementById('timer').textContent = countdown;
  if (countdown <= 0) {
    countdown = 60;
    refresh();
  }
}, 1000);

refresh();
</script>
</body>
</html>
